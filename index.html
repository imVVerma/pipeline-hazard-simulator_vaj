<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pipeline Hazard Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <header>
    <div class="header-left">
      <span class="header-tag">CS2011 · Plaksha University</span>
      <h1>Pipeline <span>Hazard</span> Simulator</h1>
    </div>
    <div class="header-meta">
      RAW Hazard Detection<br>
      Forwarding &amp; Stall Analysis
    </div>
  </header>

  <section class="panel input-panel">
    <div class="controls-grid">

      <!-- LEFT: Instruction Input -->
      <div class="instruction-setup">
        <div class="setup-header">
          <label>Enter Instructions</label>
          <div class="setup-actions">
            <button id="btn-add-instr" class="btn-icon" title="Add Instruction">+</button>
            <button id="btn-clear-instr" class="btn-icon" title="Clear All">×</button>
          </div>
        </div>

        <div id="instruction-list" class="instruction-list">
          <!-- Instruction rows added by JS -->
        </div>

        <div class="textarea-fallback">
          <label for="instructions-input">Raw Instructions</label>
          <textarea id="instructions-input" rows="4" spellcheck="false"
            placeholder="ADD R1, R2, R3&#10;LW R4, 0(R1)&#10;SUB R5, R4, R2"></textarea>
        </div>
        <div id="error-message" class="error-message hidden"></div>
      </div>

      <!-- RIGHT: Pipeline Config -->
      <div class="options-group">
        <div class="setting-row">
          <label for="stages-select">Pipeline Stages:</label>
          <select id="stages-select">
            <option value="5-stage">5-Stage (IF, ID, EX, MEM, WB)</option>
            <option value="4-stage">4-Stage (IF, ID, EX, MEM/WB)</option>
          </select>
        </div>

        <div class="setting-row toggle-wrapper">
          <label for="forwarding-toggle" class="checkbox-label">
            <input type="checkbox" id="forwarding-toggle" checked>
            <span class="toggle-text">Enable Forwarding</span>
          </label>
        </div>
      </div>

    </div><!-- /.controls-grid -->

    <div class="button-group">
      <button id="btn-run"   class="btn primary">Run</button>
      <button id="btn-step"  class="btn secondary">Step</button>
      <button id="btn-reset" class="btn outline">Reset</button>
    </div>
  </section>

  <!-- Simulation Output -->
  <section id="simulator-view" class="view-section hidden">

    <div id="stats-bar" class="stats-bar hidden"></div>

    <div class="tables-container">
      <div id="main-table-wrapper" class="table-wrapper">
        <h3 id="main-table-title" class="table-title hidden">Pipeline Execution</h3>
        <div id="main-table"></div>
      </div>
    </div>

    <div class="panel explanation-panel">
      <h3>Detected Hazards</h3>
      <div id="event-log" class="log-container"></div>
    </div>

  </section>
</div>

<script type="module" src="app.js?v=2"></script>
</body>
</html>
